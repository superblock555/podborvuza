<div class="reg">
    <p>Придумайте имя пользователя</p>
    <input type="text" placeholder="Введите имя пользователя" [(ngModel)]="username">
    <p>Введите почту</p>
    <input type="email" placeholder="example@mail.ru" [(ngModel)]="email">
    <p>Придумайте пароль</p>
    <input type="password" placeholder="Введите пароль" [(ngModel)]="password"><br>
    <button (click)="register()" routerLink="/home" >Зарегистрироваться</button>
</div>
